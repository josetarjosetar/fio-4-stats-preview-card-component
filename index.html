<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./images/favicon-32x32.png"
    />

    <title>Frontend Mentor | Stats preview card component</title>

    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="background">
      <div class="card">
        <picture class="card-image">
          <source
            media="(min-width: 768px)"
            srcset="./images/image-header-desktop.jpg"
          />
          <img
            src="./images/image-header-mobile.jpg"
            alt="Image header"
            class="card-image-source"
          />
        </picture>
        <div class="card-text">
          <p class="title">
            Get <span class="highlight-title">insights</span> that help your
            business grow.
          </p>
          <p class="description">
            Discover the benefits of data analytics and make better decisions
            regarding revenue, customer experience, and overall efficiency.
          </p>
          <div class="stats-list">
            <div class="stat-item">
              <p class="stat-number">10k+</p>
              <p class="stat-text">companies</p>
            </div>
            <div class="stat-item">
              <p class="stat-number">314</p>
              <p class="stat-text">templates</p>
            </div>
            <div class="stat-item">
              <p class="stat-number">12M+</p>
              <p class="stat-text">queries</p>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
